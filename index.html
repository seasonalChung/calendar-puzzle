<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>日曆拼圖求解器</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f7f6; margin: 20px; }
        .container { display: flex; gap: 30px; margin-top: 20px; flex-wrap: wrap; justify-content: center; }
        .controls { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 280px; }
        .board-container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(7, 45px); grid-template-rows: repeat(7, 45px); gap: 6px; }
        .cell { width: 45px; height: 45px; border: 1px solid #eee; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; background: #fff; border-radius: 6px; color: #888; }
        /* 移除 (0,6), (1,6) 與 (6,3-6) 的視覺表現 */
        .cell.hidden { visibility: hidden; border: none; background: transparent; }
        .cell.selected { background: #e74c3c !important; color: white !important; border-color: #c0392b; }
        /* 拼圖塊顏色 */
        .p-1 { background: #87CEEB; color: #333; } .p-2 { background: #F1C40F; color: #333; }
        .p-3 { background: #E67E22; color: #fff; } .p-4 { background: #95A5A6; color: #fff; }
        .p-5 { background: #D35400; color: #fff; } .p-6 { background: #9B59B6; color: #fff; }
        .p-7 { background: #2C3E50; color: #fff; } .p-8 { background: #F39C12; color: #333; }
        
        select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #ddd; font-size: 16px; }
        button { background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2ecc71; }
        #status { margin-top: 15px; font-weight: bold; color: #2c3e50; text-align: center; }
        #results-area { margin-top: 30px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; }
        .mini-board-wrapper { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .mini-board { display: grid; grid-template-columns: repeat(7, 16px); gap: 2px; justify-content: center; margin-top: 5px; }
        .mini-cell { width: 16px; height: 16px; border-radius: 2px; }
    </style>
</head>
<body>

    <h1>🧩 日曆拼圖全窮舉計算機</h1>

    <div class="container">
        <div class="controls">
            <label>選擇月份：</label>
            <select id="monthSelect"></select>
            <label>選擇日期：</label>
            <select id="daySelect"></select>
            <button onclick="startSolving()">開始窮舉搜尋</button>
            <div id="status">請選擇日期後按下開始</div>
        </div>

        <div class="board-container">
            <div id="mainGrid" class="grid"></div>
        </div>
    </div>

    <div id="results-area"></div>

<script>
const MONTHS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
const PIECES = {
    "P1": [[0,0], [0,1], [0,2], [0,3], [1,3]],
    "P2": [[0,0], [0,1], [0,2], [0,3], [1,1]],
    "P3": [[0,0], [0,1], [1,1], [2,1], [2,2]],
    "P4": [[0,0], [0,1], [0,2], [1,0], [2,0]],
    "P5": [[0,0], [0,1], [1,1], [2,0], [2,1]],
    "P6": [[0,0], [0,1], [1,0], [1,1], [1,2]],
    "P7": [[0,0], [1,0], [2,0], [2,1], [3,1]],
    "P8": [[0,0], [0,1], [0,2], [1,0], [1,1], [1,2]]
};

// 座標判斷邏輯：定義哪些座標是存在的格子
function isValidCell(r, c) {
    if (r >= 0 && r <= 1 && c >= 0 && c <= 5) return true; // 月份區 (不含 0,6 和 1,6)
    if (r >= 2 && r <= 5 && c >= 0 && c <= 6) return true; // 日期主要區
    if (r === 6 && c >= 0 && c <= 2) return true;          // 29-31日區
    return false;
}

function getMonthPos(idx) { return idx < 6 ? [0, idx] : [1, idx - 6]; }
function getDayPos(d) {
    if (d <= 7) return [2, d - 1];
    if (d <= 14) return [3, d - 8];
    if (d <= 21) return [4, d - 15];
    if (d <= 28) return [5, d - 22];
    return [6, d - 29];
}

// 初始化 UI
const mSel = document.getElementById('monthSelect');
const dSel = document.getElementById('daySelect');
MONTHS.forEach((m, i) => mSel.add(new Option(m, i)));
for(let i=1; i<=31; i++) dSel.add(new Option(i + " 日", i));

function drawPreview() {
    const grid = document.getElementById('mainGrid');
    grid.innerHTML = '';
    const mPos = getMonthPos(parseInt(mSel.value));
    const dPos = getDayPos(parseInt(dSel.value));

    for (let r = 0; r < 7; r++) {
        for (let c = 0; c < 7; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            if (!isValidCell(r, c)) {
                cell.classList.add('hidden');
            } else if (r === mPos[0] && c === mPos[1]) {
                cell.classList.add('selected');
                cell.textContent = MONTHS[mSel.value];
            } else if (r === dPos[0] && c === dPos[1]) {
                cell.classList.add('selected');
                cell.textContent = dSel.value;
            } else {
                // 顯示座標提示 (可選)
                // cell.textContent = `${r},${c}`; 
            }
            grid.appendChild(cell);
        }
    }
}
mSel.onchange = dSel.onchange = drawPreview;
drawPreview();

// 拼圖變體算法
function generateVariants(coords) {
    const variants = new Set();
    let curr = coords;
    for (let i = 0; i < 4; i++) {
        curr = curr.map(([r, c]) => [c, -r]); // Rotate
        [false, true].forEach(flip => {
            let temp = flip ? curr.map(([r, c]) => [r, -c]) : curr;
            let minR = Math.min(...temp.map(p => p[0]));
            let minC = Math.min(...temp.map(p => p[1]));
            let norm = temp.map(([r, c]) => [r - minR, c - minC]).sort((a,b) => a[0]-b[0] || a[1]-b[1]);
            variants.add(JSON.stringify(norm));
        });
    }
    return Array.from(variants).map(s => JSON.parse(s));
}

const ALL_VAR_DATA = Object.keys(PIECES).map(k => generateVariants(PIECES[k]));
let solutions = [];

function startSolving() {
    const status = document.getElementById('status');
    const resArea = document.getElementById('results-area');
    resArea.innerHTML = '';
    solutions = [];
    status.textContent = "🔍 搜尋中...";

    setTimeout(() => {
        const board = Array(7).fill().map((_, r) => Array(7).fill().map((_, c) => isValidCell(r, c) ? 0 : -1));
        const mPos = getMonthPos(parseInt(mSel.value));
        const dPos = getDayPos(parseInt(dSel.value));
        board[mPos[0]][mPos[1]] = -2; // 佔用標記
        board[dPos[0]][dPos[1]] = -2;

        const used = Array(ALL_VAR_DATA.length).fill(false);
        const startTime = performance.now();
        
        solve(board, used);
        
        const endTime = performance.now();
        const sec = ((endTime - startTime) / 1000).toFixed(2);
        status.textContent = `✅ 完成！找到 ${solutions.length} 種解答 (${sec}秒)`;
        solutions.forEach((sol, i) => renderMiniBoard(sol, i + 1));
    }, 100);
}

function solve(board, used) {
    if (solutions.length >= 1000) return; // 限制顯示數量防止網頁崩潰

    let tr = -1, tc = -1;
    for (let r = 0; r < 7; r++) {
        for (let c = 0; c < 7; c++) {
            if (board[r][c] === 0) { tr = r; tc = c; break; }
        }
        if (tr !== -1) break;
    }

    if (tr === -1) {
        solutions.push(JSON.parse(JSON.stringify(board)));
        return;
    }

    for (let i = 0; i < ALL_VAR_DATA.length; i++) {
        if (used[i]) continue;
        for (let shape of ALL_VAR_DATA[i]) {
            for (let [dr, dc] of shape) {
                let startR = tr - dr, startC = tc - dc;
                let cells = [];
                let canPlace = true;

                for (let [pr, pc] of shape) {
                    let nr = startR + pr, nc = startC + pc;
                    if (nr >= 0 && nr < 7 && nc >= 0 && nc < 7 && board[nr][nc] === 0) {
                        cells.push([nr, nc]);
                    } else {
                        canPlace = false; break;
                    }
                }

                if (canPlace) {
                    cells.forEach(([r, c]) => board[r][c] = i + 1);
                    used[i] = true;
                    solve(board, used);
                    used[i] = false;
                    cells.forEach(([r, c]) => board[r][c] = 0);
                    if (solutions.length >= 1000) return;
                }
            }
        }
    }
}

function renderMiniBoard(board, id) {
    const resArea = document.getElementById('results-area');
    const wrapper = document.createElement('div');
    wrapper.className = 'mini-board-wrapper';
    wrapper.innerHTML = `<small>方案 ${id}</small>`;
    
    const mini = document.createElement('div');
    mini.className = 'mini-board';
    for (let r = 0; r < 7; r++) {
        for (let c = 0; c < 7; c++) {
            const cell = document.createElement('div');
            cell.className = 'mini-cell';
            const val = board[r][c];
            if (val > 0) cell.classList.add('p-' + val);
            else if (val === -2) cell.style.background = "#e74c3c";
            else if (val === -1) cell.style.background = "transparent";
            else cell.style.background = "#ddd";
            mini.appendChild(cell);
        }
    }
    wrapper.appendChild(mini);
    resArea.appendChild(wrapper);
}
</script>
</body>

</html>
